name: Build Mangetsu APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract project
        run: unzip Mangetsu.zip

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: android-actions/setup-android@v3

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p Mangetsu/gradle/wrapper
          curl -Lo Mangetsu/gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        run: cd Mangetsu && chmod +x gradlew && ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: mangetsu-debug
          path: Mangetsu/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
